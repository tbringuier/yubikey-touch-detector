name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgpgme-dev pkg-config

      - uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod
          cache: true

      - name: Build
        working-directory: src
        run: |
          go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o yubikey-touch-detector-linux-${{ matrix.goarch }} \
            .

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goarch }}
          path: src/yubikey-touch-detector-linux-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: yubikey-touch-detector-linux-*
          generate_release_notes: true
          fail_on_unmatched_files: true
